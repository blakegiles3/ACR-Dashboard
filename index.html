<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACR Anomaly Dashboard — DN Hunting Patch</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
    --red: #f85149; --orange: #d29922; --yellow: #e3b341;
    --green: #3fb950; --blue: #58a6ff; --gray: #484f58;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
         background: var(--bg); color: var(--text); padding: 24px; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }

  /* Summary Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
  .card:hover { border-color: var(--accent); }
  .card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .card-num { font-size: 28px; font-weight: 700; }
  .card-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .card-num.red { color: var(--red); } .card-num.orange { color: var(--orange); }
  .card-num.green { color: var(--green); } .card-num.blue { color: var(--blue); }
  .card-num.yellow { color: var(--yellow); } .card-num.gray { color: var(--gray); }
  .card-num.white { color: var(--text); }

  /* Controls */
  .controls { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .controls input { background: var(--surface); border: 1px solid var(--border); color: var(--text);
                     padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 300px; }
  .controls select { background: var(--surface); border: 1px solid var(--border); color: var(--text);
                      padding: 8px 12px; border-radius: 6px; font-size: 14px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface); position: sticky; top: 0; z-index: 2; cursor: pointer; user-select: none; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th:hover { color: var(--accent); }
  tr:hover { background: rgba(88,166,255,0.06); }
  .sort-arrow { font-size: 10px; margin-left: 4px; }

  /* Sparkline */
  .sparkline { display: inline-block; vertical-align: middle; }
  .sparkline-bar { display: inline-block; width: 6px; margin: 0 1px; vertical-align: bottom;
                    background: var(--accent); border-radius: 1px; min-height: 1px; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin: 1px 2px; }
  .badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-orange { background: rgba(210,153,34,0.15); color: var(--orange); }
  .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-blue { background: rgba(88,166,255,0.15); color: var(--blue); }
  .badge-yellow { background: rgba(227,179,65,0.15); color: var(--yellow); }
  .badge-gray { background: rgba(72,79,88,0.15); color: var(--gray); }

  /* Detail panel */
  .detail { display: none; background: var(--surface); border: 1px solid var(--border);
             border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .detail.open { display: block; }
  .detail h2 { font-size: 18px; margin-bottom: 12px; }
  .detail-close { float: right; cursor: pointer; color: var(--text-muted); font-size: 20px; }
  .detail-close:hover { color: var(--text); }
  .chart-container { height: 300px; margin-top: 12px; }

  /* $ formatting */
  .money { font-variant-numeric: tabular-nums; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }

  /* Responsive */
  @media (max-width: 768px) {
    .cards { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
    .controls input { width: 100%; }
  }
</style>
</head>
<body>

<h1>🔍 ACR Anomaly Dashboard</h1>
<p class="subtitle">DN Hunting Patch — <span id="customerCount"></span> customers | Data as of <span id="fetchDate"></span> | FY26 YTD</p>

<div class="cards" id="cards"></div>

<div class="detail" id="detail">
  <span class="detail-close" onclick="closeDetail()">✕</span>
  <h2 id="detailTitle"></h2>
  <div id="detailFlags"></div>
  <div class="chart-container"><canvas id="detailChart"></canvas></div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search by name or TPID..." oninput="filterTable()">
  <select id="filterFlag" onchange="filterTable()">
    <option value="all">All Anomalies</option>
    <option value="spike">🔴 Spikes</option>
    <option value="new_acr">🟢 New ACR</option>
    <option value="fast_growing">🔵 Fast Growing</option>
    <option value="declining">🟡 Declining</option>
    <option value="sharp_decline">🟠 Sharp Decline</option>
    <option value="no_acr">⚫ No ACR</option>
    <option value="stable">⚪ Stable</option>
  </select>
  <select id="sortBy" onchange="sortTable()">
    <option value="total_desc">Total ACR ↓</option>
    <option value="total_asc">Total ACR ↑</option>
    <option value="latest_desc">Latest Month ↓</option>
    <option value="mom_desc">MoM Change ↓</option>
    <option value="mom_asc">MoM Change ↑</option>
    <option value="name_asc">Name A–Z</option>
  </select>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th onclick="toggleSort('name')">Account <span class="sort-arrow" id="sort-name"></span></th>
      <th onclick="toggleSort('tpid')">TPID <span class="sort-arrow" id="sort-tpid"></span></th>
      <th onclick="toggleSort('total')">FY26 Total <span class="sort-arrow" id="sort-total"></span></th>
      <th onclick="toggleSort('latest')">Latest Month <span class="sort-arrow" id="sort-latest"></span></th>
      <th onclick="toggleSort('mom')">MoM Δ <span class="sort-arrow" id="sort-mom"></span></th>
      <th>Trend</th>
      <th>Anomalies</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

let customers = DATA.customers || [];
let detailChart = null;
let currentSort = {field: 'total', dir: 'desc'};
let activeCardFilter = null;

function fmt$(v) {
  if (v == null) return '—';
  if (Math.abs(v) >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return '$' + (v/1e3).toFixed(1) + 'K';
  return '$' + v.toFixed(0);
}

function fmtPct(v) {
  if (v == null) return '—';
  const cls = v > 0 ? 'positive' : v < 0 ? 'negative' : '';
  const sign = v > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${v.toFixed(1)}%</span>`;
}

function sparkline(series) {
  const vals = series.map(s => s.acr);
  const mx = Math.max(...vals, 1);
  return '<span class="sparkline">' +
    vals.map(v => `<span class="sparkline-bar" style="height:${Math.max(1, (v/mx)*24)}px"></span>`).join('') +
    '</span>';
}

function badges(flags) {
  return flags.map(f =>
    `<span class="badge badge-${f.severity}" title="${f.detail}">${f.label}</span>`
  ).join('');
}

function renderCards() {
  const s = DATA.summary || {};
  const cards = [
    {label: 'Total Customers', val: s.total || 0, color: 'white', filter: null},
    {label: 'With ACR', val: s.with_acr || 0, color: 'white', filter: 'with_acr'},
    {label: 'Spikes', val: s.spikes || 0, color: 'red', filter: 'spike'},
    {label: 'New ACR', val: s.new_acr || 0, color: 'green', filter: 'new_acr'},
    {label: 'Fast Growing', val: s.fast_growing || 0, color: 'blue', filter: 'fast_growing'},
    {label: 'Declining', val: s.declining || 0, color: 'yellow', filter: 'declining'},
    {label: 'No ACR', val: s.no_acr || 0, color: 'gray', filter: 'no_acr'},
    {label: 'Stable', val: s.stable || 0, color: 'white', filter: 'stable'},
  ];
  document.getElementById('cards').innerHTML = cards.map((c, i) =>
    `<div class="card" onclick="toggleCardFilter('${c.filter}', this)" data-filter="${c.filter}">
       <div class="card-num ${c.color}">${c.val}</div>
       <div class="card-label">${c.label}</div>
     </div>`
  ).join('');
}

function toggleCardFilter(filter, el) {
  if (!filter) return;
  if (activeCardFilter === filter) {
    activeCardFilter = null;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  } else {
    activeCardFilter = filter;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }
  filterTable();
}

function matchesFilter(cust, filter) {
  if (!filter || filter === 'all') return true;
  if (filter === 'with_acr') return cust.total_acr > 0;
  if (filter === 'stable') return cust.primary_flag === 'stable';
  return cust.flags.some(f => f.type === filter) || cust.primary_flag === filter;
}

function getDisplayCustomers() {
  const search = document.getElementById('search').value.toLowerCase();
  const flagFilter = document.getElementById('filterFlag').value;

  return customers.filter(c => {
    const matchSearch = !search ||
      c.name.toLowerCase().includes(search) ||
      String(c.tpid).includes(search);
    const matchFlag = matchesFilter(c, flagFilter);
    const matchCard = !activeCardFilter || matchesFilter(c, activeCardFilter);
    return matchSearch && matchFlag && matchCard;
  });
}

function sortCustomers(list) {
  const {field, dir} = currentSort;
  const mult = dir === 'asc' ? 1 : -1;
  return list.sort((a, b) => {
    let va, vb;
    switch(field) {
      case 'name': va = a.name.toLowerCase(); vb = b.name.toLowerCase();
        return va < vb ? -1*mult : va > vb ? 1*mult : 0;
      case 'tpid': return (a.tpid - b.tpid) * mult;
      case 'total': return ((a.total_acr||0) - (b.total_acr||0)) * mult;
      case 'latest': return ((a.latest_acr||0) - (b.latest_acr||0)) * mult;
      case 'mom': return ((a.mom_change||0) - (b.mom_change||0)) * mult;
      default: return 0;
    }
  });
}

function toggleSort(field) {

  document.querySelectorAll('.sort-arrow').forEach(el => el.textContent = '');
  const arrowEl = document.getElementById('sort-' + currentSort.field);
  if (arrowEl) arrowEl.textContent = currentSort.dir === 'asc' ? '▲' : '▼';

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = list.map(c =>
    `<tr onclick="showDetail(${c.tpid})" style="cursor:pointer">
       <td><strong>${c.name}</strong></td>
       <td class="money">${c.tpid}</td>
       <td class="money">${fmt$(c.total_acr)}</td>
       <td class="money">${fmt$(c.latest_acr)}</td>
       <td>${fmtPct(c.mom_change)}</td>
       <td>${sparkline(c.series || [])}</td>
       <td>${badges(c.flags || [])}</td>
     </tr>`
  ).join('');
}

function filterTable() { renderTable(); }
function sortTable() {
  const val = document.getElementById('sortBy').value;
  const [field, dir] = val.split('_');
  currentSort = {field: field === 'mom' ? 'mom' : field, dir};
  renderTable();
}

function showDetail(tpid) {
  const cust = customers.find(c => c.tpid === tpid);
  if (!cust) return;

  document.getElementById('detailTitle').textContent = `${cust.name} (TPID: ${cust.tpid})`;
  document.getElementById('detailFlags').innerHTML =
    `<p>FY26 Total: <strong>${fmt$(cust.total_acr)}</strong> | Latest: <strong>${fmt$(cust.latest_acr)}</strong> | MoM: ${fmtPct(cust.mom_change)}</p>` +
    `<p style="margin-top:8px">${badges(cust.flags || [])}</p>` +
    (cust.flags || []).map(f => `<p style="color:var(--text-muted);font-size:12px;margin-top:4px">• ${f.detail}</p>`).join('');

  const series = cust.series || [];
  const labels = series.map(s => s.short);
  const values = series.map(s => s.acr);

  if (detailChart) detailChart.destroy();

  const ctx = document.getElementById('detailChart').getContext('2d');
  detailChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Monthly ACR',
        data: values,
        backgroundColor: values.map((v, i) => {
          if (i > 0 && values[i-1] > 0 && v > values[i-1] * 1.5 && v > 1000) return 'rgba(248,81,73,0.7)';
          if (v > 0 && (i === 0 || values.slice(0,i).every(x => x === 0))) return 'rgba(63,185,80,0.7)';
          return 'rgba(88,166,255,0.7)';
        }),
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {
          callbacks: {
            label: ctx => '$' + ctx.parsed.y.toLocaleString(undefined, {maximumFractionDigits: 0})
          }
        }
      },
      scales: {
        y: {
          ticks: {
            callback: v => fmt$(v),
            color: '#8b949e'
          },
          grid: {color: 'rgba(48,54,61,0.5)'},
        },
        x: { ticks: {color: '#8b949e'}, grid: {display: false} }
      }
    }
  });

  const detail = document.getElementById('detail');
  detail.classList.add('open');
  detail.scrollIntoView({behavior: 'smooth', block: 'start'});
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  if (detailChart) { detailChart.destroy(); detailChart = null; }
}

// Init
document.getElementById('customerCount').textContent = DATA.total_customers || customers.length;
document.getElementById('fetchDate').textContent = DATA.fetched_at || 'unknown';
renderCards();
currentSort = {field: 'total', dir: 'desc'};
renderTable();
</script>
</body>
</html>
